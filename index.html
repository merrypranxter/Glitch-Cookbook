
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glitch Art Cookbook</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background-color: #121212;
      color: #E0E0E0;
    }
    .font-mono {
      font-family: 'Roboto Mono', monospace;
    }
    .font-sans {
        font-family: 'Inter', sans-serif;
    }
    .glitch-text-hover {
        transition: all 0.1s ease-in-out;
    }
    .glitch-text-hover:hover {
        text-shadow: 
            2px 2px 0px #ff00ff, 
            -2px -2px 0px #00ffff;
        transform: skewX(-5deg);
    }
     .glitch-text-active {
        text-shadow: 
            2px 2px 0px #ff00ff, 
            -2px -2px 0px #00ffff;
    }
    .scrollbar-thin-dark::-webkit-scrollbar {
        width: 8px;
    }
    .scrollbar-thin-dark::-webkit-scrollbar-track {
        background: #1f1f1f;
    }
    .scrollbar-thin-dark::-webkit-scrollbar-thumb {
        background-color: #4a4a4a;
        border-radius: 4px;
        border: 2px solid #1f1f1f;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.17.0",
    "react": "https://aistudiocdn.com/react@^19.1.1",
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/"
  }
}
</script>
</head>
<body class="bg-zinc-900 text-zinc-200">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
